<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE CITY</title>
</head>
<body>
    <script src="engine/Container.js"></script>
    <script src="engine/Loader.js"></script>
    <script src="engine/Renderer.js"></script>
    <script src="engine/Sprite.js"></script>
    <script>
        const {Loader, Renderer, Sprite, Container} = GameEngine
        let sprite = null 
        const loader = new Loader
        const renderer = new Renderer({
            width: 400,
            height: 400,
            background: 'gray',
            update (timestamp) {
                if (!sprite) {
                    return
                }

                // sprite.frame.x = sprite.texture.width / 2 + 100 * Math.cos(timestamp / 100)
                // sprite.frame.y = sprite.texture.height / 2 + 100 * Math.sin(timestamp / 100)
                // sprite.x = renderer.canvas.width / 2 + 100 * Math.cos(timestamp / 100)
                // sprite.y = renderer.canvas.height / 2 + 100 * Math.sin(timestamp / 100)
            }
        })
        document.body.append(renderer.canvas)
        loader.addImage('sample', 'static/sample.jpg')
        loader.addJson('persons', 'static/persons.json')
        loader.load(() => {
            sprite = new Sprite(loader.getImage('sample'), {
                x: 0,
                y: 0,
                width: 100,
                height: 100,
                // anchorX: 0.5,
                // anchorY: 0.5,
            })
            const container = new Container()
            renderer.stage.add(container)
            container.add(sprite)
            renderer.stage.add(sprite)
            sprite.absoluteX = sprite.absoluteY = 0
        })
        class A {
            constructor () {
                this.a = 5
                this.b = 100
            }

            funcA () {
                return 'funcA'
            }
        }
        class B extends A {
            constructor () {
                super()
                this.b = 120
                this.c = 150
            }
            funcB () {
                return 'funcB'
            }
        }
        class
    </script>
</body>
</html>
