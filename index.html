<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE CITY</title>
</head>
<body>
    <script src="engine/DisplayObject.js"></script>
    <script src="engine/Container.js"></script>
    <script src="engine/Loader.js"></script>
    <script src="engine/Renderer.js"></script>
    <script src="engine/Sprite.js"></script>
    <script>
        const {Loader, Renderer, Sprite, Container} = GameEngine
        let sprite1 = null,
            sprite2 = null,
            container = null
        const loader = new Loader
        const renderer = new Renderer({
            width: 400,
            height: 400,
            background: 'gray',
            update (timestamp) {
                if (!sprite1) {
                    return
                }
                container.rotation = timestamp / 1000
                sprite1.rotation = timestamp / 1000
                // sprite.frame.x = sprite.texture.width / 2 + 100 * Math.cos(timestamp / 100)
                // sprite.frame.y = sprite.texture.height / 2 + 100 * Math.sin(timestamp / 100)
                // sprite.x = renderer.canvas.width / 2 + 100 * Math.cos(timestamp / 100)
                // sprite.y = renderer.canvas.height / 2 + 100 * Math.sin(timestamp / 100)
            }
        })
        document.body.append(renderer.canvas)
        loader.addImage('sample', 'static/sample.jpg')
        loader.addJson('persons', 'static/persons.json')
        loader.load(() => {
            sprite1 = new Sprite(loader.getImage('sample'), {
                scale: 0.4,
                width: 100,
                height: 100,
                anchorX: 0.5,
                anchorY: 0.5,
                x: 300,
                y: renderer.canvas.height / 2,
                // rotation: Math.PI / 2,
            })
            sprite2 = new Sprite(loader.getImage('sample'), {
                scale: 0.4,
                width: 100,
                height: 100,
                anchorX: 0.5,
                anchorY: 0.5,
                x: 100,
                y: renderer.canvas.height / 2,
                // rotation: Math.PI / 2,
            })
            container = new Container()

            // container.x = container.y = 100
            container.rotation = Math.PI / 20
            // container.anchorX = 0.2
            // container.anchorY = 0.2

            renderer.stage.add(container)
            container.add(sprite1)
            container.add(sprite2)
        })
    </script>
</body>
</html>
